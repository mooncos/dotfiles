# ─────────────────────────────────────────────
# General Settings
# ─────────────────────────────────────────────

# True color & undercurl support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Faster key repetition
set -s escape-time 0

# Enable mouse
set -g mouse on

# Focus events for vim/neovim
set -g focus-events on

# Extended keys (CSI u is the default format in tmux 3.4+)
set -g extended-keys on

# ─────────────────────────────────────────────
# Keybindings
# ─────────────────────────────────────────────

# Change prefix to Ctrl-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Alt+vim keys (no prefix needed)
bind -n M-H resize-pane -L 3
bind -n M-J resize-pane -D 3
bind -n M-K resize-pane -U 3
bind -n M-L resize-pane -R 3

# Switch windows with Alt+number (no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ─────────────────────────────────────────────
# Appearance (Catppuccin Mocha)
# ─────────────────────────────────────────────

# Bells off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#181825,fg=#cdd6f4"

# Left status: session name
set -g status-left-length 50
set -g status-left "#[bg=#a6e3a1,fg=#181825,bold] #H #[bg=#89b4fa,fg=#181825,bold]  #S #[bg=#181825,fg=#89b4fa]"

# Right status: uptime, cpu, disk, date & time
set -g status-right-length 120
set -g status-right "#[bg=#313244,fg=#a6e3a1] UP #(~/.tmux-status.sh up) #[bg=#45475a,fg=#f9e2af] CPU #(~/.tmux-status.sh cpu) #[bg=#313244,fg=#f5c2e7] DSK #(~/.tmux-status.sh dsk) #[bg=#45475a,fg=#cdd6f4] %Y-%m-%d #[bg=#89b4fa,fg=#181825,bold] %H:%M "

# Window tabs
set -g status-justify left
setw -g window-status-format "#[fg=#313244,bg=#181825] #I #[fg=#cdd6f4]#W "
setw -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold] #I #[fg=#cdd6f4]#W "
setw -g window-status-separator ""

# Messages
set -g message-style "bg=#313244,fg=#a6e3a1,bold"
set -g message-command-style "bg=#313244,fg=#cba6f7"

# Clock
setw -g clock-mode-colour "#89b4fa"

# Copy mode
setw -g mode-style "bg=#313244,fg=#f5c2e7,bold"
